name: NestJS Module Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install queue dependencies
        working-directory: runmq-base/queue
        run: npm install

      - name: Install nestjs dependencies
        working-directory: runmq-base/nestjs
        run: npm install

      - name: Lint
        working-directory: runmq-base/nestjs
        run: npm run lint

      - name: Build
        working-directory: runmq-base/nestjs
        run: npm run build

      - name: Run unit tests
        working-directory: runmq-base/nestjs
        run: npm run test:unit

      - name: Run integration tests
        working-directory: runmq-base/nestjs
        run: npm run test:integration
